<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Team | Security Dashboard</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar" aria-label="주요 메뉴">
        <div>
            <div class="logo">SENTINEL 404</div>
            <div class="sidebar-caption">Security Monitor</div>
        </div>
        <div class="menu" role="tablist" aria-label="대시보드 화면">
            <button class="nav-item active" type="button" data-view="dashboard" role="tab" aria-selected="true">대시보드</button>
            <button class="nav-item" type="button" data-view="rules" role="tab" aria-selected="false">탐지 규칙</button>
            <button class="nav-item" type="button" data-view="settings" role="tab" aria-selected="false">설정</button>
        </div>
    </nav>

    <main class="main-content">
        <header class="topbar">
            <div class="page-heading">
                <h1 id="view-title">대시보드</h1>
                <p id="view-subtitle">파일 이벤트와 격리 상태를 실시간으로 확인합니다.</p>
            </div>
            <div class="topbar-actions">
                <div class="status-group">
                    <span id="status-dot" class="dot offline"></span>
                    <span id="server-status-text">서버 연결 중...</span>
                </div>
                <div class="controls">
                    <button id="btn-demo-start" class="btn-primary">데모 시작</button>
                    <button id="btn-demo-stop" class="btn-secondary">데모 중지</button>
                </div>
            </div>
        </header>

        <section class="view-panel active" data-view-panel="dashboard">
            <section class="grid-container" aria-label="주요 상태">
                <div class="card stat-card">
                    <h2>격리 중인 항목</h2>
                    <p id="quarantine-count">0</p>
                </div>
                <div class="card stat-card">
                    <h2>감시 디렉터리</h2>
                    <p id="target-path">-</p>
                </div>
            </section>

            <section class="card">
                <div class="section-header">
                    <h2>실시간 파일 이벤트 로그</h2>
                    <span class="section-kicker">Live</span>
                </div>
                <div id="log-container" class="log-viewer"></div>
            </section>

            <section class="card">
                <div class="section-header">
                    <h2>Incident 및 격리 관리</h2>
                    <span class="section-kicker">Response</span>
                </div>
                <div class="table-wrap">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>대상 경로</th>
                                <th>항목 수</th>
                                <th>상태</th>
                                <th>액션</th>
                            </tr>
                        </thead>
                        <tbody id="quarantine-list"></tbody>
                    </table>
                </div>
            </section>
        </section>

        <section class="view-panel" data-view-panel="rules" hidden>
            <div class="card placeholder-card">
                <span class="placeholder-label">Empty</span>
                <h2>탐지 규칙</h2>
                <p>아직 대시보드에 연결된 규칙 편집 화면이 없습니다.</p>
                <div class="placeholder-grid" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </section>

        <section class="view-panel" data-view-panel="settings" hidden>
            <div class="card placeholder-card">
                <span class="placeholder-label">Empty</span>
                <h2>설정</h2>
                <p>환경 설정 화면은 준비 중입니다.</p>
                <div class="placeholder-grid" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
