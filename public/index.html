<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Team | Security Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">SENTINEL 404</div>
        <div class="menu">
            <div class="active">대시보드</div>
            <div>탐지 규칙</div>
            <div>설정</div>
        </div>
    </nav>

    <div class="main-content">
        <header>
            <div class="status-group">
                <span id="status-dot" class="dot offline"></span>
                <span id="server-status-text">서버 연결 중...</span>
            </div>
            <div class="controls">
                <button id="btn-demo-start" class="btn-primary" onclick="handleDemoStart()">데모 시작</button>
                <button id="btn-demo-stop" class="btn-secondary" onclick="handleDemoStop()">데모 중지</button>
            </div>
        </header>

        <section class="grid-container">
            <div class="card stat-card">
                <h3>격리 중인 항목</h3>
                <p id="quarantine-count">0</p>
            </div>
            <div class="card stat-card">
                <h3>감시 디렉터리</h3>
                <p id="target-path">-</p>
            </div>
        </section>

        <section class="card">
            <h3>실시간 파일 이벤트 로그</h3>
            <div id="log-container" class="log-viewer"></div>
        </section>

        <section class="card">
            <h3>Incident 및 격리 관리</h3>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>대상 경로</th>
                        <th>항목 수</th>
                        <th>상태</th>
                        <th>액션</th>
                    </tr>
                </thead>
                <tbody id="quarantine-list"></tbody>
            </table>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
