<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Team | Security Dashboard</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar" aria-label="주요 메뉴">
        <div>
            <div class="logo">SENTINEL 404</div>
            <div class="sidebar-caption">Security Monitor</div>
        </div>
        <div class="menu" role="tablist" aria-label="대시보드 화면">
            <button class="nav-item active" type="button" data-view="dashboard" role="tab" aria-selected="true">대시보드</button>
            <button class="nav-item" type="button" data-view="rules" role="tab" aria-selected="false">탐지 규칙</button>
            <button class="nav-item" type="button" data-view="settings" role="tab" aria-selected="false">설정</button>
        </div>
    </nav>

    <main class="main-content">
        <header class="topbar">
            <div class="page-heading">
                <h1 id="view-title">대시보드</h1>
                <p id="view-subtitle">파일 이벤트와 격리 상태를 실시간으로 확인합니다.</p>
            </div>
            <div class="topbar-actions">
                <div class="status-group">
                    <span id="status-dot" class="dot offline"></span>
                    <span id="server-status-text">서버 연결 중...</span>
                </div>
                <button id="btn-watch-toggle" class="btn-watch-toggle" type="button">감시 시작</button>
                <div class="controls">
                    <button id="btn-demo-action" class="btn-primary" type="button">데모 시작</button>
                    <button id="btn-demo-reset" class="btn-secondary" type="button">데모 초기화</button>
                </div>
            </div>
        </header>

        <section class="view-panel active" data-view-panel="dashboard">
            <section class="grid-container" aria-label="주요 상태">
                <div class="card stat-card">
                    <h2>격리 중인 항목</h2>
                    <p id="quarantine-count">0</p>
                </div>
                <div class="card stat-card">
                    <h2>감시 중인 항목</h2>
                    <p id="watching-count">0</p>
                </div>
                <div class="card stat-card">
                    <h2>감시 디렉터리</h2>
                    <p id="target-path">-</p>
                    <fieldset class="watch-mode-group" aria-label="감시 디렉터리 모드">
                        <label class="radio-option">
                            <input type="radio" name="watch-mode" value="normal" checked>
                            <span>일반 감시</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="watch-mode" value="demo">
                            <span>데모 폴더 감시</span>
                        </label>
                    </fieldset>
                    <div class="watch-path-row">
                        <input id="watch-target-input" type="text" spellcheck="false" placeholder="/path/to/watch">
                        <button id="btn-watch-target-apply" class="btn-secondary" type="button">적용</button>
                    </div>
                    <p id="watch-target-error" class="field-error" hidden></p>
                </div>
            </section>

            <section class="card">
                <div class="section-header">
                    <h2>파일시스템 이벤트</h2>
                    <span class="section-kicker">Live</span>
                </div>
                <div id="fs-event-log-container" class="log-viewer"></div>
            </section>

            <section class="card">
                <div class="section-header">
                    <h2>Incident 및 격리 로그</h2>
                    <span class="section-kicker">Response</span>
                </div>
                <div id="incident-log-container" class="log-viewer"></div>
            </section>

            <section class="card">
                <div class="section-header">
                    <h2>Incident 및 격리 관리</h2>
                    <span class="section-kicker">Response</span>
                </div>
                <div class="table-wrap">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>대상 경로</th>
                                <th>항목 수</th>
                                <th>상태</th>
                                <th>액션</th>
                            </tr>
                        </thead>
                        <tbody id="quarantine-list"></tbody>
                    </table>
                </div>
            </section>
        </section>

        <section class="view-panel" data-view-panel="rules" hidden>
            <div class="card placeholder-card">
                <span class="placeholder-label">Empty</span>
                <h2>탐지 규칙</h2>
                <p>아직 대시보드에 연결된 규칙 편집 화면이 없습니다.</p>
                <div class="placeholder-grid" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </section>

        <section class="view-panel" data-view-panel="settings" hidden>
            <section class="card settings-card">
                <div class="section-header">
                    <h2>격리 대응 단계</h2>
                    <span class="section-kicker">Policy</span>
                </div>
                <form id="response-policy-form" class="response-policy-form">
                    <label class="policy-option">
                        <input id="policy-lock-permissions" type="radio" name="responsePolicyLevel" value="lock">
                        <span class="policy-copy">
                            <strong>1단계: 감시 디렉토리 권한 잠금</strong>
                            <span>감시 대상 파일과 폴더 권한을 잠가 추가 변경을 차단합니다.</span>
                        </span>
                    </label>
                    <label class="policy-option warning">
                        <input id="policy-kill-processes" type="radio" name="responsePolicyLevel" value="kill">
                        <span class="policy-copy">
                            <strong>2단계: 의심 프로세스 강제 종료</strong>
                            <span>1단계의 권한 잠금과 더불어 감시 디렉토리 내부 파일을 실제로 점유 중인 PID를 찾아 종료 시도합니다.</span>
                        </span>
                    </label>
                    <label class="policy-option danger">
                        <input id="policy-shutdown-system" type="radio" name="responsePolicyLevel" value="shutdown">
                        <span class="policy-copy">
                            <strong>3단계: 즉시 시스템 강제 종료</strong>
                            <span>최후의 수단입니다. 가장 강력한 대응 수단이나, 예기지 못한 종료로 다른 프로세스에서의 손상이 발생할 수 있습니다.</span>
                        </span>
                    </label>
                    <p id="response-policy-error" class="field-error" hidden></p>
                    <div class="settings-actions">
                        <button id="btn-response-policy-save" class="btn-primary" type="submit">저장</button>
                        <span id="response-policy-status" class="settings-status">현재 정책을 불러오는 중</span>
                    </div>
                </form>
            </section>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
